services:
  - type: web
    name: cog-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # Persistent token store (Neon/Postgres). Required for iSolarCloud to
      # survive free-tier spin-downs; without it, solar tokens are lost on restart.
      - key: DATABASE_URL
        sync: false
      # iSolarCloud — optional. Solar endpoints stay disabled if unset.
      - key: app_key
        sync: false
      - key: secret_key
        sync: false
      - key: app_id
        sync: false
      - key: redirect_uri
        sync: false
      - key: ISOLAR_SERVER
        sync: false
